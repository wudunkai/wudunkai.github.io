<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>优惠券页面生成器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
      .pages-container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(443.5px, 1fr));
        gap: 2rem;
        margin-top: 2rem;
      }
      .page-item {
        break-inside: avoid;
        position: relative;
      }
      .page {
        padding-top: 88px;
        width: 443.5px;
        height: 960px;
      }
      .page-type-1 {
        background: url("https://kms.goofish.pro/xgj/Cmq1UHhHAN/ka/Fr5qIuofVMMBLsDfcz1-3kfSHPUK.jpeg")
          no-repeat center center / cover;
      }
      .page-type-2 {
        background: url("https://kms.goofish.pro/xgj/Cmq1UHhHAN/ka/Fo8BFEd9tfaODko-S2MBdNAJFpHB.jpg")
          no-repeat center center / cover;
      }
      .page-inner {
        margin-top: 12px;
        text-align: center;
        margin-bottom: 16px;
        background: #f9f9f9;
      }
      .title {
        font-size: 20px;
        font-weight: bold;
        margin-bottom: 4px;
        letter-spacing: 1.6px;
      }
      .desc {
        color: #666;
        font-size: 13.6px;
      }
      section {
        margin-top: 52.8px;
      }
      .title-left {
        font-weight: bold;
        font-size: 19.2px;
        color: #0f0f0f;
        margin: 0 22.4px;
        background: #fff;
      }
      .qrCode {
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 44px 32px 0;
        background: #fff;
      }
      .qrcode-container {
        margin-right: 56px;
      }
      .barcode-container {
        position: absolute;
        right: 63px;
      }
      .vertical-barcode {
        transform: rotate(90deg) scale(0.7);
        transform-origin: center;
        margin: 20px 0;
      }
    </style>
  </head>
  <body class="bg-gray-100">
    <div id="app" class="container mx-auto p-4">
      <div class="bg-white rounded-lg shadow-md p-6 mb-6">
        <h1 class="text-2xl font-bold text-gray-800 mb-6">优惠券页面生成器</h1>

        <div class="mb-4">
          <label class="block text-gray-700 text-sm font-bold mb-2" for="name">
            标题
          </label>
          <input
            id="name"
            type="text"
            class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
            placeholder="请输入优惠券标题"
          />
        </div>

        <div class="mb-4">
          <label class="block text-gray-700 text-sm font-bold mb-2" for="date">
            有效期至
          </label>
          <input
            id="date"
            type="date"
            class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
          />
        </div>

        <div class="mb-6">
          <label
            class="block text-gray-700 text-sm font-bold mb-2"
            for="qrCodes"
          >
            券码（每行一个）
          </label>
          <textarea
            id="qrCodes"
            class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
            rows="4"
            placeholder="请输入券码，每行一个&#10;例如：&#10;COUPON001&#10;COUPON002&#10;COUPON003"
          ></textarea>
        </div>

        <div class="flex flex-wrap items-center gap-2">
          <button
            class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline"
            onclick="generatePages()"
          >
            生成页面
          </button>
          <button
            class="bg-gray-500 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline"
            onclick="resetForm()"
          >
            重置
          </button>
          <button
            class="bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline"
            onclick="batchDownloadAllImages()"
            id="downloadBtn"
            disabled
          >
            批量下载所有图片
          </button>
        </div>
      </div>

      <div class="pages-container" id="pagesContainer">
        <!-- 优惠券页面将在这里生成 -->
      </div>
    </div>

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const typeValue = urlParams.get("type");

      // 生成优惠券页面
      function generatePages() {
        const name = document.getElementById("name").value;
        const date = document.getElementById("date").value;
        const qrCodes = document.getElementById("qrCodes").value;

        if (!name || !date || !qrCodes) {
          alert("请填写所有必填字段");
          return;
        }

        const codes = qrCodes.split("\n").filter((code) => code.trim());
        const container = document.getElementById("pagesContainer");
        container.innerHTML = "";

        codes.forEach((code) => {
          const pageElement = createCouponPage(name, date, code);
          container.appendChild(pageElement);
        });

        // 启用下载按钮
        document.getElementById("downloadBtn").disabled = false;
      }

      // 创建单个优惠券页面
      function createCouponPage(name, date, code) {
        const pageItem = document.createElement("div");
        pageItem.className = "page-item";
        const newCode = code.match(/.{1,4}/g).join(" ");
        const newDate = date.split("-").join("/");
        pageItem.dataset.code = code;
        pageItem.dataset.name = name;
        pageItem.dataset.date = date;

        pageItem.innerHTML = `
        <div class="page page-type-${typeValue}">
          <div class="page-inner">
            <h2 class="title">${name}</h2>
            <p class="desc">有效期至：${newDate} 23:59</p>
          </div>
          <section>
            <h3 class="title-left">${newCode}</h3>
            <div class="qrCode">
              <div class="qrcode-container">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=145x145&data=${encodeURIComponent(code)}" alt="二维码">
              </div>
              <div class="barcode-container">
                <img src="https://bwipjs-api.metafloor.com/?bcid=code128&text=${encodeURIComponent(code)}&scale=2&rotate=N&height=7" alt="条形码" class="vertical-barcode">
              </div>
            </div>
          </section>
        </div>
      `;

        return pageItem;
      }

      // 重置表单
      function resetForm() {
        document.getElementById("name").value = "";
        document.getElementById("date").value = "";
        document.getElementById("qrCodes").value = "";
        document.getElementById("pagesContainer").innerHTML = "";
        document.getElementById("downloadBtn").disabled = true;
      }

      // 下载单个页面图片
      async function downloadSinglePage(pageItem) {
        const code = pageItem.dataset.code;
        const name = pageItem.dataset.name;
        const page = pageItem.querySelector(".page");

        try {
          // 使用html2canvas生成图片
          const canvas = await html2canvas(page, {
            scale: 2,
            useCORS: true,
            imageQuality: 1,
          });

          // 转换为Blob并下载
          canvas.toBlob((blob) => {
            saveAs(blob, `${code}.jpg`);
          }, "image/jpeg");
        } catch (error) {
          console.error(`生成优惠券 ${code} 图片失败:`, error);
          alert(`下载失败，请重试`);
        }
      }

      // 批量下载所有页面图片（每个页面单独下载）
      async function batchDownloadAllImages() {
        const pages = document.querySelectorAll(".page-item");
        if (pages.length === 0) {
          alert("请先生成页面");
          return;
        }

        // 逐个下载每个页面图片
        for (let i = 0; i < pages.length; i++) {
          const page = pages[i];
          await downloadSinglePage(page);

          // 添加延迟避免请求过于频繁
          await new Promise((resolve) => setTimeout(resolve, 500));
        }

        alert("所有图片下载完成！");
      }
    </script>
  </body>
</html>
